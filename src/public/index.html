<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GamerRent | Aluguel de Periféricos</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white font-sans">

    <nav class="p-6 border-b border-purple-900 flex justify-between items-center shadow-md">
        <h1 class="text-2xl font-bold text-purple-500 italic">🎮 GamerRent</h1>
        <div class="text-right">
            <p class="text-xs text-gray-500 uppercase tracking-widest">Projeto Acadêmico</p>
            <p class="text-xs text-purple-400">Versão 1.0.0</p>
        </div>
    </nav>

    <main class="container mx-auto p-8">
        <header class="text-center mb-12">
            <h2 class="text-4xl font-extrabold mb-3">Hardware de Elite por Assinatura</h2>
            <p class="text-gray-400">Selecione o plano desejado.</p>
        </header>

        <div class="max-w-md mx-auto bg-gray-800 p-6 rounded-2xl border border-gray-700 shadow-xl mb-12">
            <h3 class="text-lg font-bold mb-3 text-purple-400">🚚 Calcular Frete de Entrega</h3>
            <div class="flex gap-3">
                <input type="text" id="input-cep" placeholder="Digite seu CEP (8 dígitos)" maxlength="8"
                       class="flex-1 bg-gray-900 border border-gray-700 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-purple-500 transition-all">
                <button onclick="calcularFrete()" class="bg-purple-600 hover:bg-purple-700 px-6 py-3 rounded-xl font-bold transition-all transform active:scale-95">
                    Calcular
                </button>
            </div>
            <div id="resultado-frete" class="hidden mt-4 p-4 bg-gray-900 rounded-lg border border-purple-500/30 text-sm"></div>
        </div>

        <div id="grid-produtos" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
        </div>
    </main>

    <script>
        // Variável global para garantir apenas UMA escolha no site inteiro
        let escolhaUnica = null;
        // >>> ADICIONADO: Armazena o valor do frete retornado pela API externa <<<
        let freteCalculado = null;

        async function carregarProdutos() {
            try {
                const response = await fetch('/api/produtos');
                const produtos = await response.json();
                const grid = document.getElementById('grid-produtos');
                grid.innerHTML = '';

                produtos.forEach(p => {
                    grid.innerHTML += `
                        <div class="bg-gray-800 p-6 rounded-2xl border border-gray-700 shadow-xl flex flex-col" id="card-${p.id}">
                            <img src="${p.img}" class="w-full h-48 object-contain mb-6 rounded-xl shadow-md" alt="${p.nome}">
                            
                            <h3 class="text-xl font-bold mb-4 text-purple-100 h-14 flex items-center">${p.nome}</h3>
                            
                            <div class="space-y-3 mb-6">
                                <button onclick="selecionarPlano(${p.id}, '${p.nome}', 'diario', ${p.precoDiaria})" 
                                        id="btn-diario-${p.id}"
                                        class="w-full flex justify-between p-3 bg-gray-900 rounded-lg border border-gray-700 hover:border-purple-500 transition-all text-left">
                                    <span class="text-gray-400 text-sm">Plano Diário</span>
                                    <span class="font-bold">R$ ${p.precoDiaria.toFixed(2)}</span>
                                </button>

                                <button onclick="selecionarPlano(${p.id}, '${p.nome}', 'mensal', ${p.precoMensal})" 
                                        id="btn-mensal-${p.id}"
                                        class="w-full flex justify-between p-3 bg-gray-900 rounded-lg border border-gray-700 hover:border-purple-500 transition-all text-left">
                                    <span class="text-gray-400 text-sm">Plano Mensal</span>
                                    <span class="font-bold">R$ ${p.precoMensal.toFixed(2)}</span>
                                </button>
                            </div>

                            <button onclick="finalizarAluguel(${p.id})" 
                                    class="mt-auto w-full bg-purple-600 hover:bg-purple-700 py-3 rounded-xl font-bold shadow-lg transition-all transform active:scale-95">
                                Reservar Agora
                            </button>
                        </div>
                    `;
                });
            } catch (error) {
                console.error("Erro ao carregar:", error);
            }
        }

        function selecionarPlano(produtoId, nomeProduto, tipo, valor) {
            const todosOsBotoes = document.querySelectorAll('button[id^="btn-"]');
            todosOsBotoes.forEach(btn => {
                btn.classList.remove('border-purple-500', 'bg-purple-900/40', 'ring-2', 'ring-purple-500');
                btn.classList.add('border-gray-700', 'bg-gray-900');
            });

            const idBotao = tipo === 'diario' ? `btn-diario-${produtoId}` : `btn-mensal-${produtoId}`;
            const btnSelecionado = document.getElementById(idBotao);
            btnSelecionado.classList.remove('border-gray-700', 'bg-gray-900');
            btnSelecionado.classList.add('border-purple-500', 'bg-purple-900/40', 'ring-2', 'ring-purple-500');

            escolhaUnica = { id: produtoId, nome: nomeProduto, tipo: tipo, valor: valor };
        }

        // >>> ADICIONADO: Função que busca o Frete na API através do seu Backend <<<
        async function calcularFrete() {
            const cep = document.getElementById('input-cep').value;
            const resultadoDiv = document.getElementById('resultado-frete');

            if (!cep || cep.trim().length !== 8) {
                alert("⚠️ Por favor, digite um CEP válido com 8 números!");
                return;
            }

            try {
                const response = await fetch(`/api/frete/${cep}`);
                const dados = await response.json();

                if (!response.ok) {
                    resultadoDiv.innerHTML = `<p class="text-red-400 font-bold">❌ ${dados.erro}</p>`;
                    resultadoDiv.classList.remove('hidden');
                    freteCalculado = null;
                    return;
                }

                resultadoDiv.innerHTML = `
                    <p class="text-gray-300"><span class="font-bold text-purple-400">Região:</span> ${dados.logradouro}, ${dados.bairro} - ${dados.localidade}/${dados.uf}</p>
                    <p class="text-emerald-400 font-bold mt-1 text-base">🚚 Custo de Entrega: R$ ${dados.valorFrete.toFixed(2)}</p>
                `;
                resultadoDiv.classList.remove('hidden');
                
                freteCalculado = dados.valorFrete;
            } catch (error) {
                console.error("Erro ao calcular frete:", error);
                resultadoDiv.innerHTML = `<p class="text-red-400">❌ Falha ao conectar com o servidor.</p>`;
                resultadoDiv.classList.remove('hidden');
                freteCalculado = null;
            }
        }

        function finalizarAluguel(cardId) {
            if (!escolhaUnica || escolhaUnica.id !== cardId) {
                alert("⚠️ Por favor, selecione um plano para este produto antes de reservar!");
                return;
            }

            //  Soma o frete ao total se o usuário tiver calculado o CEP <<<
            const valorTotal = freteCalculado ? (escolhaUnica.valor + freteCalculado) : escolhaUnica.valor;
            const textoFrete = freteCalculado ? `\nFrete: R$ ${freteCalculado.toFixed(2)}\nTotal: R$ ${valorTotal.toFixed(2)}` : `\n(Frete não calculado)`;

            alert(`🎮 RESERVA CONFIRMADA!\n\nEquipamento: ${escolhaUnica.nome}\nPlano: ${escolhaUnica.tipo.toUpperCase()}\nPreço Base: R$ ${escolhaUnica.valor.toFixed(2)}${textoFrete}`);
        }

        carregarProdutos();
    </script>
</body>
</html>
